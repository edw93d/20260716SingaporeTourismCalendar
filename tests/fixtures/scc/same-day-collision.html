<!-- One vessel calling twice on one local date: two rows collapse to a single
     `{vessel}|{arrivalDate}` key. SCC publishes no per-call identifier, so the
     two arrivals (0800 and 1600 on 30 Jul) cannot be told apart by the key. The
     store would upsert the second over the first and no signal in CONTEXT.md's
     Source health would show the loss -- so the parser reports the collision
     rather than letting it happen silently (#48). The first row seen wins. -->
<!doctype html>
<html lang="en-US"><head><meta charset="UTF-8"><title>Cruise Schedule | Singapore Cruise Centre</title></head>
<body>
<table class="schedule-table schedule-table_cruise">
<thead>
<tr>
                           <th class="sc-arrive" scope="col">ARRIVAL</th>
                           <th class="sc-depature" scope="col">DEPARTURE</th>
                           <th class="sc-cruise" scope="col">CRUISE SHIP / CRUISE LINE</th>
                           <th class="sc-from" scope="col">FROM</th>
                           <th class="sc-from" scope="col">NEXT</th>
                        </tr>
</thead>
<tbody>
<tr>
                           <td data-label="ARRIVAL">Thu, 30 Jul 2026 <span> 0800</span></td>
                           <td data-label="DEPARTURE">Thu, 30 Jul 2026 <span> 1200</span></td>
                                                      <td data-label="CRUISE SHIP">
                           ODYSSEY <span> VILLA VIE RESIDENCES</span>                           </td>

                           <td data-label="FROM PORT">Thailand </td>
                           <td data-label="NEXT PORT">Vung Tau </td>
                        </tr>
<tr>
                           <td data-label="ARRIVAL">Thu, 30 Jul 2026 <span> 1600</span></td>
                           <td data-label="DEPARTURE">Thu, 30 Jul 2026 <span> 2000</span></td>
                                                      <td data-label="CRUISE SHIP">
                           ODYSSEY <span> VILLA VIE RESIDENCES</span>                           </td>

                           <td data-label="FROM PORT">Vung Tau </td>
                           <td data-label="NEXT PORT">Phuket </td>
                        </tr>
</tbody>
</table>
</body></html>
