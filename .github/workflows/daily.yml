# The daily run. Unattended by design: nobody is present when this fires, so
# every property it needs has to be structural rather than operational.
#
# Zero credentials end to end. `GITHUB_TOKEN` is minted by Actions for this run
# and expires with it; there is no secret, PAT or connection string anywhere in
# this file, and `tests/workflow.test.ts` holds that.
name: Daily pipeline

on:
  # 19:37 UTC = 03:37 SGT — overnight in Singapore, and **off the top of the
  # hour on purpose**: GitHub documents that scheduled runs may be dropped when
  # the platform is under load, and load concentrates on the minute everybody
  # picked. A dropped run costs a day of freshness and nothing else (the store
  # is upserted, so the next run heals it), but it is still the failure worth
  # not courting.
  schedule:
    - cron: "37 19 * * *"
  # The only way to run this on demand. Kept because the first thing anyone will
  # want after merging is to watch it run once.
  workflow_dispatch:

# **Two runs must never overlap.** The store is a single SQLite blob committed
# to the repository; two runs would each build on the same parent and the second
# push would either be rejected or clobber the first. A blob cannot merge.
#
# Queued rather than cancelled: a cancelled run may already have upserted, and
# killing it between the transaction and the commit is the one way to lose a
# scrape that was actually made.
concurrency:
  group: daily-pipeline
  cancel-in-progress: false

permissions:
  # Commit the refreshed store and feeds back.
  contents: write
  # Publish the site.
  pages: write
  id-token: write
  # Raise and auto-close the operator's breakage issues (ADR-0007, #41). The
  # pipeline shells out to `gh`, which authenticates with the run-scoped
  # `GITHUB_TOKEN` — still zero stored credentials.
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      # Full history, not the default shallow clone. The push retry below rebases
      # onto the remote ref, and rebasing a depth-1 checkout is not something git
      # can be relied on to do — the one recovery path this run has would fail in
      # exactly the situation it exists for.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # MBCCS is the one source that needs a real browser (ADR-0005, Amendment 2):
      # its schedule is a hydrated Next.js app with the stable ids only in React
      # state. Chromium and its OS libraries are installed here so the headless
      # session `src/pipeline/browser.ts` launches has a browser to drive. No
      # credential is involved — the page authenticates itself and we only read
      # what it has already loaded (#37).
      - name: Install the headless browser
        run: npx playwright install --with-deps chromium

      # Scrapes every source, folds what it saw into the store, and re-emits the
      # feeds from the store. A source that cannot be read is reported and does
      # not fail the run — see the note in `src/main.ts`. The same process then
      # raises or clears the operator's breakage issues (ADR-0007, #41) via `gh`,
      # which reads `GITHUB_TOKEN` from this step's environment — the only place a
      # credential is named, and it is the run-scoped token, not a stored secret.
      - name: Run the pipeline
        run: npm run pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit the refreshed store and feeds
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/calendar.sqlite site/feeds site/calendar.json

          # **Unreachable today, and kept anyway.** DTSTAMP is the run instant
          # (ADR-0011), so the feed differs on every run even when no source
          # could be read and nothing was upserted — there is currently no such
          # thing as a no-op run. This guard is what stops an empty commit if
          # that ever stops being true; the alternative, inventing a commit with
          # `--allow-empty`, is the keepalive #19 bans.
          if git diff --cached --quiet; then
            echo "Nothing changed."
            exit 0
          fi

          git commit -m "Daily run: refresh the store and the feeds"

          # **This push works only because `main` has no required status check;
          # see ADR-0012.** The commit is pushed directly to a protected branch
          # by `github-actions[bot]`, carrying no status of its own — so a
          # required check declines it outright, whatever it is, and the retry
          # below cannot recover (a missing status is not a stale ref). That is
          # not a hypothetical: #45 made `check` required and this step failed
          # for three days until #60 removed the requirement. Branch protection
          # is out-of-band state no test here can hold, which is why the reason
          # this line is allowed to succeed is written down rather than left to
          # be rediscovered from the failure.
          #
          # One retry, and only one. The concurrency group above means this
          # workflow is the sole writer of these paths, so a rejected push can
          # only mean a human commit landed during the run — which our commit
          # rebases onto cleanly, because it touches nothing a human edits.
          git push || {
            git fetch origin "${{ github.ref_name }}"
            git rebase "origin/${{ github.ref_name }}"
            git push
          }

      # **Publishing runs after the commit-back, and is blocked by its failure.**
      # That coupling is deliberate rather than incidental. A uid is minted once
      # and then persisted (CONTEXT.md § UID); a feed published from a store that
      # was never pushed carries uids the next run will mint again, landing a
      # duplicate in every subscriber's calendar. Not publishing costs a day of
      # freshness — the cheaper of the two failures by a wide margin.
      #
      # A failed deploy leaves the previous site up rather than blanking it, so
      # the reader sees stale, never empty.

      # **Pages must already be enabled on the repository; this step will not do
      # it.** `configure-pages` accepts an `enablement: true` that creates the
      # Pages site, and it was set here on the theory that the run should have no
      # manual prerequisite. It does not work: `GITHUB_TOKEN` is granted
      # `pages: write`, which deploys to an existing site, but *creating* one is
      # administrative and the run token is not an admin. The first real run
      # failed here with `Resource not accessible by integration` (#46).
      #
      # So Pages-enabled is this repository's one piece of clicked-once state,
      # set by `POST /repos/:owner/:repo/pages` with `build_type=workflow`. It is
      # recorded in ADR-0011 rather than left to be rediscovered from a failure,
      # because nothing in the working tree reveals it.
      - uses: actions/configure-pages@v5

      # **Uploaded as an artifact, not committed to a gh-pages branch.** The
      # feeds are already committed above, on the branch they are generated on,
      # which is what keeps them diffable; publishing them a second time into a
      # branch would add a commit per run whose entire diff is a DTSTAMP.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
